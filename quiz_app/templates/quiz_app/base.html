{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prabhu's Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050505;
            --card-bg: #111;
        }

        body { 
            background-color: var(--dark-bg); 
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 243, 255, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 255, 0.05) 0%, transparent 20%);
            min-height: 100vh;
        }
        
        h1, h2, h3, h4, h5, .navbar-brand {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        /* Navbar Neon styling */
        .navbar { 
            background: rgba(5,5,5,0.8) !important;
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            backdrop-filter: blur(10px);
        }
        .navbar-brand { 
            color: var(--neon-blue) !important;
            text-shadow: 0 0 8px var(--neon-blue), 0 0 20px var(--neon-blue);
            font-weight: bold; 
            font-size: 1.5rem;
        }
        .nav-link {
            color: #fff !important;
            transition: 0.3s;
        }
        .nav-link:hover {
            color: var(--neon-pink) !important;
            text-shadow: 0 0 8px var(--neon-pink);
        }

        /* Cards Neon Styling */
        .card { 
            background-color: var(--card-bg); 
            border: 1px solid var(--neon-purple); 
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.2);
            color: #fff;
            border-radius: 12px;
        }
        .card-header {
            background: transparent !important;
            border-bottom: 1px solid var(--neon-purple);
        }

        /* Texts */
        .text-primary {
            color: var(--neon-blue) !important;
            text-shadow: 0 0 5px var(--neon-blue);
        }
        .text-dark {
            color: #fff !important;
        }
        .text-muted {
            color: #aaa !important;
        }

        /* Buttons */
        .btn-primary {
            background-color: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 8px var(--neon-blue), inset 0 0 8px rgba(0,243,255,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px var(--neon-blue), inset 0 0 10px var(--neon-blue);
        }

        .btn-outline-primary {
            color: var(--neon-pink);
            border-color: var(--neon-pink);
            box-shadow: 0 0 8px rgba(255,0,255,0.3);
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
        }
        .btn-outline-primary:hover {
            background-color: var(--neon-pink);
            color: #000;
            box-shadow: 0 0 20px var(--neon-pink);
            border-color: var(--neon-pink);
        }

        /* Badges */
        .badge.bg-secondary {
            background-color: transparent !important;
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            box-shadow: 0 0 5px var(--neon-pink);
            font-family: 'Orbitron', sans-serif;
        }
        .badge.bg-warning {
            background-color: transparent !important;
            border: 1px solid #ffea00;
            color: #ffea00 !important;
            box-shadow: 0 0 5px #ffea00;
        }
        .badge.bg-info {
            background-color: transparent !important;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue) !important;
            box-shadow: 0 0 5px var(--neon-blue);
        }
        .badge.bg-light {
            background-color: transparent !important;
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple) !important;
            box-shadow: 0 0 5px var(--neon-purple);
        }
        
        /* Options styling */
        .option-label { 
            cursor: pointer; 
            padding: 15px; 
            border: 1px solid #333; 
            border-radius: 8px; 
            display: block; 
            margin-bottom: 12px; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #151515;
            color: #ddd;
        }
        .option-label:hover { 
            background-color: rgba(0, 243, 255, 0.05); 
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
            transform: translateX(5px);
        }
        .option-input:checked + .option-label { 
            background-color: rgba(0, 243, 255, 0.15); 
            color: #fff; 
            border-color: var(--neon-blue); 
            box-shadow: 0 0 15px var(--neon-blue), inset 0 0 10px rgba(0,243,255,0.2);
            transform: scale(1.02);
        }
        
        /* Form Inputs */
        .form-control {
            background-color: #111 !important;
            border: 1px solid #444 !important;
            color: #fff !important;
            transition: 0.3s;
        }
        .form-control:focus {
            border-color: var(--neon-purple) !important;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.5) !important;
        }
        .form-label {
            color: var(--neon-blue);
            letter-spacing: 1px;
        }

        /* List groups (for results) */
        .list-group-item {
            background: #111;
            color: #fff;
            border-color: #333;
        }
        .list-group-item-success {
            background: rgba(25, 135, 84, 0.1) !important;
            color: #28a745 !important;
            border-color: #28a745 !important;
            box-shadow: inset 0 0 10px rgba(40, 167, 69, 0.5);
            text-shadow: 0 0 5px rgba(40, 167, 69, 0.5);
        }
        .badge.bg-success {
            background-color: transparent !important;
            border: 1px solid #28a745;
            color: #28a745 !important;
            box-shadow: 0 0 8px #28a745;
        }

        /* Progress Bar */
        .progress {
            background-color: #222;
            border: 1px solid #444;
            box-shadow: inset 0 0 10px #000;
        }
        .progress-bar.bg-primary {
            background-color: var(--neon-blue) !important;
            box-shadow: 0 0 15px var(--neon-blue);
        }
        .progress-bar.bg-success {
            background-color: #28a745 !important;
            box-shadow: 0 0 15px #28a745;
        }
        
        /* Misc */
        .bg-light { background-color: #1a1a1a !important; color: #fff !important; }
        .text-dark { color: #fff !important; }
        .shadow-sm { box-shadow: 0 0 10px rgba(0,0,0,0.5) !important; }
        hr { border-color: var(--neon-purple); box-shadow: 0 0 5px var(--neon-purple); }
        .alert-warning {
            background: rgba(255, 234, 0, 0.1);
            color: #ffea00;
            border: 1px solid #ffea00;
            box-shadow: 0 0 10px #ffea00;
        }
        .alert-danger {
            background: rgba(255, 0, 0, 0.1);
            color: #ff3333;
            border: 1px solid #ff3333;
            box-shadow: 0 0 10px #ff3333;
        }

    </style>
</head>
