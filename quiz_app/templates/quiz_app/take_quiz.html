{% extends 'quiz_app/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="mb-4">
            <h2 class="fw-bold text-primary">{{ quiz.title }}</h2>
            <p class="text-muted">Answer all questions below and submit your quiz.</p>
        </div>

        <form method="post" id="quizForm">
            {% csrf_token %}
            {% for question in questions %}
            <div class="card mb-4 shadow-sm border-0">
                <div class="card-body p-4">
                    <h5 class="fw-bold text-dark mb-4">{{ forloop.counter }}. {{ question.text }}</h5>
                    
                    <div class="options-container">
                        {% for choice in question.choices.all %}
                        <div class="form-check p-0">
                            <input class="form-check-input option-input d-none" 
                                type="radio" 
                                name="question_{{ question.id }}" 
                                id="choice_{{ choice.id }}" 
                                value="{{ choice.id }}" required>
                            <label class="form-check-label option-label d-flex align-items-center mb-3 p-3 rounded shadow-sm border" 
                                for="choice_{{ choice.id }}">
                                <span class="badge bg-light text-dark shadow-sm rounded-circle p-2 me-3" style="width: 30px; height: 30px;">
                                    {{ forloop.counter|stringformat:"c"|upper }}
                                </span>
                                {{ choice.text }}
                            </label>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
            {% endfor %}

            <div class="d-grid gap-2 col-md-6 mx-auto mt-5 mb-5">
                <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow">
                    Submit Quiz
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
